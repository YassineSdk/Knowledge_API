# ============================================================
# PROMPT : Query Expansion
# version : v1
# ============================================================

key: query_expansion_v1

desc: >
  Takes a mission topic from internal audit context and expands it
  into optimised queries covering 7 knowledge dimensions.
  Used for RAG retrieval pipeline.

system: >
  You are an expert internal auditor with deep knowledge in risk management,
  compliance, and audit methodologies. Your role is to generate structured,
  precise, and comprehensive queries that will be used to retrieve relevant
  knowledge from a document database.
  Always respond in the same language as the mission topic.
  Always return valid JSON only — no explanation, no markdown.

prompt: >
  Given the following internal audit mission topic: "{mission}"

  Expand it into 7 optimised search queries, one for each knowledge dimension below.
  Each query must be specific, searchable, and directly related to the mission topic.

  Return ONLY a valid JSON object with this exact structure:
  {{
    "mission"  : "{mission}",
    "queries"  : {{
      "context_and_definition" : "query about definitions scope and context of {mission}",
      "causes"                 : "query about root causes and risk factors of {mission}",
      "controls"               : "query about internal controls and mitigation for {mission}",
      "regularisation"         : "query about laws regulations and compliance for {mission}",
      "best_practices"         : "query about industry best practices and standards for {mission}",
      "benchmarking"           : "query about KPIs and performance indicators for {mission}",
      "real_incidents"         : "query about real cases incidents and audit findings for {mission}"
    }}
  }}